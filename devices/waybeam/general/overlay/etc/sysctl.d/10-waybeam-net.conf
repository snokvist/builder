# Waybeam network buffer tuning (vehicle side)
#
# Default rmem_max/wmem_max is too small for RTP video output bursts.
# The encoder produces keyframes that can exceed 100KB. With WiFi TX
# scheduling delays, the kernel socket buffer can back up.

# Socket receive buffer max
net.core.rmem_max = 2621440

# Socket send buffer max (for RTP video + telemetry output)
net.core.wmem_max = 2621440

# Raise defaults so applications get usable buffers without setsockopt
net.core.rmem_default = 524288
net.core.wmem_default = 524288

# Input queue length — prevent drops under burst
net.core.netdev_max_backlog = 5000
