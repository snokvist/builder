# Interface name to monitor
IFACE=wlan0

# HTTP API template (must include exactly one "%d" for bitrate in kbps)
API_CMD=wget -qO- "http://127.0.0.1/api/v1/set?video0.bitrate=%d" >/dev/null 2>&1

# Base bitrates (kbps) for MCS indices 0..7 at 20 MHz
PR=6500,13000,19500,26000,39000,52000,58500,65000

# Percentage thresholds for MCS 0..7 (lower‑bounds)
PCT_THRESH=00,13,25,38,50,63,75,88

# Hysteresis gap in percent
H=2

# Number of 0.1 s loops without UDP before falling back to proc‑RSSI
UDP_TIMEOUT_LOOPS=50

# Loops of 0.1 s between re‑probing channel width
REFRESH_CNT=50

# Loops of 0.1 s between writing status to /tmp/MSPOSD.msg
STATUS_CNT=5

# Font/position parameters for msposd OSD
OSD_PARAMS=&L30&F32
