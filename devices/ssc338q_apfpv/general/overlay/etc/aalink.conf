# Interface name to monitor
IFACE=wlan0

# HTTP API template (must include exactly one "%d" for bitrate in kbps)
API_CMD=wget -qO- "http://127.0.0.1/api/v1/set?video0.bitrate=%d" >/dev/null 2>&1

# Base bitrates (kbps) for MCS indices 0..7 at 20 MHz
PR=6500,13000,19500,26000,39000,52000,58500,65000

# Percentage thresholds for MCS 0..7 (lower‐bounds), comma-sep’d two‐digit values
# e.g. PCT_THRESH[0]=00, PCT_THRESH[1]=13, …, PCT_THRESH[7]=88
PCT_THRESH=00,13,25,38,50,63,75,88

# RSSI hysteresis thresholds for MCS=0..7, comma-separated
THR=-85,-80,-75,-65,-20,-10,-9,-8

# Hysteresis gap in dB
H=2

# number of 0.1 s loops without UDP before falling back to RSSI
UDP_TIMEOUT_LOOPS=20

# How many 0.1 s loops between re-probing channel width
REFRESH_CNT=31

# How many 0.1 s loops between writing status to /tmp/MSPOSD.msg
STATUS_CNT=5

# Percentage thresholds for MCS 0..7 (lower‐bounds), comma-sep’d two‐digit values
# e.g. PCT_THRESH[0]=00, PCT_THRESH[1]=13, …, PCT_THRESH[7]=88
PCT_THRESH=00,13,25,38,50,63,75,88

# Set font parameter string for msposd
OSD_PARAMS=&L31&F30
