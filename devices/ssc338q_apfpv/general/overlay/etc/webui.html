<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>OPENIPC AP-FPV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* ------- palette & base -------------------------------------------- */
    :root { --blue:#007bff; --blue-dk:#0056b3; --bg:#eef4fb; --txt:#003366; }
    body  { margin:0; font-family:sans-serif; background:var(--bg);
            color:var(--txt); padding:1.5em; }
    h1    { text-align:center; color:#0059b3; font-size:1.6em; margin-bottom:1.2em; }

    /* ------- row layout ------------------------------------------------- */
    .row  { display:flex; justify-content:center; align-items:center;
            margin:.4em auto; max-width:340px; width:90%; gap:.5em; }
    .btn  { flex:0 0 120px;            /* fixed width for all buttons  */
            width:120px; padding:.7em 0; font-size:1em; color:#fff;
            background:var(--blue); border:0; border-radius:6px; cursor:pointer;
            white-space:nowrap; }
    .btn:hover { background:var(--blue-dk); }
    select,input { flex:1; padding:.6em; font-size:1em; border:1px solid #ccc;
                   border-radius:6px; min-width:0; }  /* min-width:0 lets flex shrink */

    .danger      { background:#dc3545; }
    .danger:hover{ background:#b02a37; }

    /* log panel ---------------------------------------------------------- */
    pre#info { margin-top:2em; max-width:90%; margin-left:auto;margin-right:auto;
               background:#dceaff; border:1px solid #339; border-radius:6px;
               padding:1em; min-height:8em; white-space:pre-wrap; font-size:.9em; }
  </style>
</head>
<body>

<h1>OPENIPC AP-FPV</h1>

<!-- SSID ------------------------------------------------------------ -->
<div class="row">
  <button class="btn" onclick="goArg('set_ssid', ssid.value)">Save&nbsp;SSID</button>
  <input id="ssid" placeholder="New SSID">
</div>

<!-- Password -------------------------------------------------------- -->
<div class="row">
  <button class="btn" onclick="goArg('set_password', pass.value)">Save&nbsp;PW</button>
  <input id="pass" placeholder="New Wi‑Fi password">
</div>

<!-- Channel --------------------------------------------------------- -->
<div class="row">
  <button class="btn" onclick="goArg('set_channel', chSel.value)">Set&nbsp;Chan</button>
  <select id="chSel">
    <option value="ch36 --make-permanent">ch36</option>
    <option value="ch36-20 --make-permanent">ch36‑20</option>
    <option value="ch44 --make-permanent">ch44</option>
    <option value="ch44-20 --make-permanent">ch44‑20</option>
    <option value="ch52 --make-permanent">ch52</option>
    <option value="ch52-20 --make-permanent">ch52‑20</option>
    <option value="ch149 --make-permanent">ch149</option>
    <option value="ch149-20 --make-permanent">ch149‑20</option>
    <option value="ch157 --make-permanent">ch157</option>
    <option value="ch157-20 --make-permanent">ch157‑20</option>
  </select>
</div>

<!-- WLAN power ------------------------------------------------------ -->
<div class="row">
  <button class="btn" onclick="goArg('set_wlanpower', pwrSel.value)">Tx&nbsp;Power</button>
  <select id="pwrSel">
    <option value="pitmode">pit‑mode</option>
    <option value="low">Low</option>
    <option value="medium">Medium</option>
    <option value="high">High</option>
  </select>
</div>

<!-- Mode ------------------------------------------------------------ -->
<div class="row">
  <button class="btn" onclick="goArg('set_mode', modeSel.value)">Set&nbsp;Mode</button>
  <select id="modeSel">
    <option value="manual">manual</option>
    <option value="aalink">aalink</option>
  </select>
</div>

<!-- msp_tty --------------------------------------------------------- -->
<div class="row">
  <button class="btn" onclick="goArg('set_tty', ttySel.value)">Set&nbsp;TTY</button>
  <select id="ttySel">
    <option value="standalone">standalone</option>
    <option value="/dev/ttyS0">/dev/ttyS0</option>
    <option value="/dev/ttyS1">/dev/ttyS1</option>
    <option value="/dev/ttyS2">/dev/ttyS2</option>
  </select>
</div>

<!-- Video resolution ------------------------------------------------ -->
<div class="row">
  <button class="btn" onclick="goVideo()">Set&nbsp;Video</button>
  <select id="vidSel"></select>
</div>
  
<!-- Show info ---------------------------------------------------------- -->
<div class="row">
  <button class="btn info" style="width:100%;flex:1"
          onclick="go('sysinfo')">Show Info</button>
</div>
  
<!-- Reboot ---------------------------------------------------------- -->
<div class="row">
  <button class="btn danger" style="width:100%;flex:1"
          onclick="go('reboot')">Reboot&nbsp;Device</button>
</div>

<!-- Latest log ------------------------------------------------------ -->
<h3 style="text-align:center;margin-top:2em;">Latest log</h3>
<pre id="info">(no log yet)</pre>

<script>
const info = document.getElementById('info');

/* helper that writes to the <pre> */
function render(txt) { info.textContent = txt || '(empty)'; }

/* poll /log every 3 s */
function updateLog() {
  fetch('/log')
    .then(r => r.text())
    .then(render)
    .catch(e => render('Log error: ' + e));
}

/* run a command, then immediately refresh the log */
function go(name) {
  fetch('/cmd/' + name)
    .then(() => updateLog())
    .catch(e => render('Fetch error: ' + e));
}

function goArg(name, arg) {
  fetch('/cmd/' + name + '?args=' + encodeURIComponent(arg))
    .then(() => updateLog())
    .catch(e => render('Fetch error: ' + e));
}

/* ------------------------------------------------------------------ */
/* video‑resolution helper                                            */
const vidSel = document.getElementById('vidSel');

/* one‑liner array with every allowed string exactly as the CLI wants */
const videoOptions = [
  "4:3 720p 60",        "4:3 720p 60 50HzAC",
  "4:3 960p 60",        "4:3 960p 60 50HzAC",
  "4:3 1080p 60",       "4:3 1080p 60 50HzAC",
  "4:3 1440p 60",       "4:3 1440p 60 50HzAC",
  "4:3 1920p 60",       "4:3 1920p 60 50HzAC",
  "4:3 720p 90",        "4:3 720p 90 50HzAC",
  "4:3 960p 90",        "4:3 960p 90 50HzAC",
  "4:3 1080p 90",       "4:3 1080p 90 50HzAC",
  "4:3 1440p 90",       "4:3 1440p 90 50HzAC",
  "4:3 540p 120",       "4:3 720p 120",
  "4:3 960p 120",       "4:3 1080p 120",
  "16:9 540p 60",       "16:9 540p 60 50HzAC",
  "16:9 720p 60",       "16:9 720p 60 50HzAC",
  "16:9 1080p 60",      "16:9 1080p 60 50HzAC",
  "16:9 1440p 60",      "16:9 1440p 60 50HzAC",
  "16:9 540p 90",       "16:9 540p 90 50HzAC",
  "16:9 720p 90",       "16:9 720p 90 50HzAC",
  "16:9 1080p 90",      "16:9 1080p 90 50HzAC",
  "16:9 1344p 90",      "16:9 1344p 90 50HzAC",
  "16:9 540p 120",      "16:9 720p 120",      "16:9 1080p 120"
];

/* populate the <select> on page load */
videoOptions.forEach(v => {
  const o = document.createElement('option');
  o.value = v;
  o.textContent = v;
  vidSel.appendChild(o);
});

/* wrap goArg so we can inject the needed quote marks "…" */
function goVideo() {
  const arg = '"' + vidSel.value + '"';   // e.g. "4:3 720p 60"
  goArg('set_video', arg);
}




  
setInterval(updateLog, 3000);   // keep log fresh
updateLog();                    // …and populate once on load
</script>
</body>
</html>
