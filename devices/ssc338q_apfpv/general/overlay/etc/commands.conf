# commands.conf  (no spaces before the colon)
set_ssid:set_wlanssid.sh
set_password:set_wlanpass.sh
set_channel:set_channel.sh
set_wlanpower:set_power.sh
set_mode:set_mode.sh
reboot:reboot -d 1 -f
sysinfo:webinfo.sh > /tmp/webui.log
set_tty:set_tty.sh
set_video:set_video.sh
control_cmd:control_cmd.sh
set_osd:set_osd.sh
ota:ota.sh
value:aalink_throughput:sed -n 's/^THROUGHPUT_PCT=\(.*\)/\1/p' /etc/aalink.conf
value:aalink_font_size:sed -n -E 's|^OSD_PARAMS=.*&F([0-9]+).*|\1|p' /etc/aalink.conf
value:aalink_osd_level:sed -n 's/^OSD_LEVEL=\(.*\)/\1/p' /etc/aalink.conf
value:aalink_signalbar:sed -n 's/^SHOW_SIGNAL_BARS=\(.*\)/\1/p' /etc/aalink.conf
value:tx_power:set_power.sh get_current
value:external_osd:set_externalosd.sh status
value:mode:fw_printenv -n mode
value:msposd_tty:fw_printenv -n msposd_tty
value:ssid:fw_printenv -n wlanssid || echo OpenIPC
value:passw:fw_printenv -n wlanpass || echo 12345678
value:wlanchan:fw_printenv -n wlanchan || echo 149
value:video_modes:set_video.sh --get-all
value:video_current:set_video.sh --get-current
masterip:set_masterip.sh
vtx_adapter_start:adapter start
set_mcs:set_mcs.sh
set_externalosd:set_externalosd.sh
set_ht40:sed -i '/^#capab$/{N s/\n.*$/\nht_capab=\[HT40+\]\[SHORT-GI-20\]\[SHORT-GI-40\]\[TX-STBC\]\[RX-STBC1\]\[LDPC\]/}' /usr/bin/adapter;echo "EU2 Capab" > /tmp/webui.log
set_ht40_bu:sed -i '/^#capab$/{N s/\n.*$/\nht_capab=\[HT40+\]\[SHORT-GI-20\]\[SHORT-GI-40\]/}' /usr/bin/adapter;echo "EU2 Capab" > /tmp/webui.log
set_noht:sed -i '/^#capab$/{N s/\n.*$/\nht_capab=/}' /usr/bin/adapter;echo "Empty Capab" > /tmp/webui.log
set_wipeht:sed -i '/^#capab$/{N s/\n.*$/\n/}' /usr/bin/adapter;echo "Wipe Capab" > /tmp/webui.log
set_stbc:sed -i '/^#capab$/{N s/\n.*$/\nht_capab=\[TX-STBC\]\[RX-STBC1\]/}' /usr/bin/adapter;echo "STBC capab" > /tmp/webui.log
set_mcs0:echo "0x0C" > "$(ls /proc/net/*/wlan0/rate_ctl)";cat "$(ls /proc/net/*/wlan0/rate_ctl)" > /tmp/webui.log
set_mcsff:echo "0xFF" > "$(ls /proc/net/*/wlan0/rate_ctl)";cat "$(ls /proc/net/*/wlan0/rate_ctl)" > /tmp/webui.log
set_distance:set_distance.sh
