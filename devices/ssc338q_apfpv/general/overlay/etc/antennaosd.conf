# antenna‑OSD configuration
rssi_key_file=/tmp/aalink_ext.msg
rssi_key_name=used_rssi
info_file    = /proc/net/rtl88x2eu/wlan0/trx_info_debug
out_file     = /tmp/MSPOSD.msg

interval     = 0.1
bar_width    = 34
top          = 80
bottom       = 20

# ------------- LINE POSITIONS & COLOURS -------------
# ┌─ Row 20: RSSI bar (colour changes with strength)
rssi_control      = 1
rssi_range0_hdr   = &F44&L10&G8
rssi_range1_hdr   = &F44&L10&G8
rssi_range2_hdr   = &F44&L40&G8
rssi_range3_hdr   = &F44&L40&G8
rssi_range4_hdr   = &F44&L20&G8
rssi_range5_hdr   = &F44&L20&G8

# ├─ Row 21: temperature / CPU stats
show_stats_line = 1
osd_hdr2        =  &F44&L20G8

# └─ Row 22: system messages
sys_msg_hdr     =  &F64&L10
system_msg_file = /tmp/osd_system.msg
system_msg_timeout = 10

osd_hdr = &F44&L20&G8
ping_ip = 192.168.0.10

start_sym = [
end_sym   = ]
empty_sym = .
