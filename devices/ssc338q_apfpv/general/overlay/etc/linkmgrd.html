<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Live Link Status</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --blue:#007bff; --blue-dk:#0056b3;
      --bg:#eef4fb; --txt:#003366;
    }

    body {
      margin: 0; padding: 1em;
      font-family: sans-serif;
      background: var(--bg);
      color: var(--txt);
    }

    h2 {
      text-align: center;
      margin: 0.5em 0 1em;
      font-size: 1.2em;
      color: var(--blue-dk);
    }

    .section {
      margin: 1em 0;
    }

    .fail-box {
      display: inline-block;
      margin: .3em .6em .3em 0;       /* tighter spacing */
      padding: .4em .6em;
      border-radius: 6px;
      background: #f2f2f2;
      font-size: .85em;
      white-space: pre-line;
      min-width: 110px;
    }

    .fail-box.active {
      font-weight: bold;
      color: #007700;
      background: #e6ffe6;
      border: 1px solid #0a0;
    }

    canvas {
      width: 100%;
      max-width: 800px;
      height: 200px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h2>Live Link Status</h2>

  <div class="section" id="infoTop">(loading...)</div>
  <div class="section" id="failBox"></div>
  <div class="section">
    <canvas id="chartCanvas"></canvas>
  </div>

  <script>
    const infoTop  = document.getElementById('infoTop');
    const failBox  = document.getElementById('failBox');
    const canvas   = document.getElementById('chartCanvas');
    const ctx      = canvas.getContext('2d');
    const maxPoints = 100;

    const nodeMap = {};
    let activeIP = null;

    function colorForIP(ip) {
      const h = [...ip].reduce((acc, c) => acc + c.charCodeAt(0), 0) % 360;
      return `hsl(${h}, 70%, 45%)`;
    }

    function updateStatus() {
      fetch('/status', { cache: 'no-store' })
        .then(r => r.ok ? r.json() : Promise.reject('HTTP ' + r.status))
        .then(json => {
          activeIP = json.active;
          infoTop.textContent = `Role: ${json.role}   |   Active: ${activeIP}`;

          failBox.innerHTML = json.nodes.map(n => {
            const isActive = n.ip === activeIP;
            const className = 'fail-box' + (isActive ? ' active' : '');
            return `<div class="${className}">
${n.ip}
RSSI:  ${n.rssi}
Succ:  ${n.succ}
Fail:  ${n.fail}
</div>`;
          }).join('');

          // Track RSSI history
          json.nodes.forEach(n => {
            const ip = n.ip;
            const val = Math.max(0, Math.min(100, n.rssi + 100));
            if (!nodeMap[ip]) {
              nodeMap[ip] = {
                rssiHistory: [],
                color: colorForIP(ip)
              };
            }
            const buf = nodeMap[ip].rssiHistory;
            buf.push(val);
            if (buf.length > maxPoints) buf.shift();
          });

          drawChart();
        })
        .catch(err => {
          infoTop.textContent = '(error fetching status)';
          failBox.textContent = err;
        });
    }

    function drawChart() {
      const W = canvas.width  = canvas.offsetWidth;
      const H = canvas.height = 200;

      ctx.clearRect(0, 0, W, H);

      Object.entries(nodeMap).forEach(([ip, data]) => {
        const vals = data.rssiHistory;
        if (vals.length < 2) return;

        const isActive = ip === activeIP;
        ctx.strokeStyle = isActive ? '#00cc00' : data.color;
        ctx.lineWidth   = isActive ? 3 : 2;

        ctx.beginPath();
        vals.forEach((v, i) => {
          const x = i / (maxPoints - 1) * W;
          const y = H - v / 100 * H;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.stroke();
      });

      // Draw reference grid lines
      ctx.strokeStyle = '#ccc';
      ctx.lineWidth = 1;
      [25, 50, 75].forEach(p => {
        const y = H - (p / 100 * H);
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      });
    }

    setInterval(updateStatus, 500);
    updateStatus();
  </script>
</body>
</html>
