<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Live Link Status</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { --blue:#007bff; --blue-dk:#0056b3; --bg:#eef4fb; --txt:#003366; }
    body { margin:0; padding:1em; font-family:sans-serif; background:var(--bg); color:var(--txt); }
    h2 { text-align:center; margin:0.5em 0 1em; font-size:1.2em; color:var(--blue-dk); }
    .section { margin:1em 0; }
    .fail-box { display:inline-block; margin:.3em .6em .3em 0; padding:.4em .6em; border-radius:6px; background:#f2f2f2; font-size:.85em; white-space:pre-line; min-width:110px; }
    .fail-box.active { font-weight:bold; color:#007700; background:#e6ffe6; border:1px solid #0a0; }
    canvas { width:100%; max-width:800px; height:200px; background:#fff; border:1px solid #ccc; border-radius:6px; }
    /* legend */
    #retryLegend { display:flex; flex-wrap:wrap; align-items:center; justify-content:flex-start; }
    .legend-item { display:inline-flex; align-items:center; margin:3px 1em 3px 0; font-size:.8em; }
    .swatch { width:14px; height:14px; border-radius:2px; margin-right:.35em; border:1px solid #0002; }
  </style>
</head>
<body>
  <h2>Live Link Status</h2>

  <div class="section" id="infoTop">(loading...)</div>
  <div class="section" id="failBox"></div>

  <!-- RSSI chart -->
  <div class="section">
    <canvas id="chartCanvas"></canvas>
  </div>

  <!-- Retry / Fail chart -->
  <div class="section">
    <canvas id="retryCanvas"></canvas>
  </div>

  <!-- Legend (below chart) -->
  <div class="section" id="retryLegend"></div>

  <!-- Summary text -->
  <div class="section" id="summaryText"></div>

  <script>
    const infoTop      = document.getElementById('infoTop');
    const failBox      = document.getElementById('failBox');
    const retryLegend  = document.getElementById('retryLegend');

    const rssiCanvas   = document.getElementById('chartCanvas');
    const rssiCtx      = rssiCanvas.getContext('2d');

    const retryCanvas  = document.getElementById('retryCanvas');
    const retryCtx     = retryCanvas.getContext('2d');

    const summaryText  = document.getElementById('summaryText');

    const MAX_POINTS = 150;

    // Fixed, high‑contrast palette for up to 10 stations
    const PALETTE = [
      '#1f77b4', // blue
      '#2ca02c', // green
      '#9467bd', // purple
      '#d62728', // red
      '#17becf', // cyan
      '#ff7f0e', // orange
      '#8c564b', // brown
      '#e377c2', // pink
      '#7f7f7f', // gray
      '#bcbd22'  // olive
    ];
    let paletteIdx = 0;

    // Data structures
    const nodeMap = {};           // ip → { rssiHist:[], retryHist:[], color }
    const cckFailHist  = [];
    const ofdmFailHist = [];
    let activeIP = null;

    const GLOBAL_LINES = [
      { label:'CCK Fail',  color:'#e41a1c', hist:cckFailHist },
      { label:'OFDM Fail', color:'#ff8c00', hist:ofdmFailHist }
    ];

    // Helpers
    const clamp100 = v => Math.max(0, Math.min(100, v));
    function nextColor() { return PALETTE[ (paletteIdx++) % PALETTE.length ]; }

    // ------------ Fetch & Update ------------
    function updateStatus() {
      fetch('/status', { cache:'no-store' })
        .then(r => r.ok ? r.json() : Promise.reject('HTTP '+r.status))
        .then(js => {
          activeIP = js.active;
          infoTop.textContent = `Role: ${js.role}   |   Active: ${activeIP}`;

          // Station boxes
          failBox.innerHTML = js.nodes.map(n => {
            const cls = 'fail-box' + (n.ip === activeIP ? ' active' : '');
            return `<div class="${cls}">\n${n.ip}\nRSSI:  ${n.rssi}\nRetry: ${n.retry}\nSucc:  ${n.succ}\nFail:  ${n.fail}\n</div>`;
          }).join('');

          // Update histories
          js.nodes.forEach(n => {
            if (!nodeMap[n.ip]) nodeMap[n.ip] = { rssiHist:[], retryHist:[], color:nextColor() };
            const nm = nodeMap[n.ip];
            nm.rssiHist .push(clamp100(n.rssi));
            nm.retryHist.push(clamp100(n.retry));
            if (nm.rssiHist.length  > MAX_POINTS) nm.rssiHist.shift();
            if (nm.retryHist.length > MAX_POINTS) nm.retryHist.shift();
          });

          cckFailHist .push(clamp100(js.cck_fail));  if (cckFailHist.length  > MAX_POINTS) cckFailHist.shift();
          ofdmFailHist.push(clamp100(js.ofdm_fail)); if (ofdmFailHist.length > MAX_POINTS) ofdmFailHist.shift();

          summaryText.textContent = `Tx Power: ${js.txpwr}   |   False Alarm: ${js.false_alarm}`;

          drawRssiChart();
          drawRetryChart();
          buildLegend();
        })
        .catch(err => { infoTop.textContent='(error fetching status)'; failBox.textContent=err; });
    }

    // ------------ Drawing utilities ------------
    function drawSeries(ctx, hist, color, H, W, solid) {
      if (hist.length < 2) return;
      ctx.strokeStyle = color;
      ctx.lineWidth   = solid ? 3 : 2;
      ctx.setLineDash(solid ? [] : [4,3]);
      ctx.beginPath();
      hist.forEach((v,i) => {
        const x = i / (MAX_POINTS-1) * W;
        const y = H - v/100 * H;
        i ? ctx.lineTo(x,y) : ctx.moveTo(x,y);
      });
      ctx.stroke();
    }

    function drawGuides(ctx,H,W) {
      ctx.strokeStyle = '#ccc';
      ctx.lineWidth   = 1;
      ctx.setLineDash([2,2]);
      [25,50,75].forEach(p=>{const y=H - p/100*H; ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();});
      ctx.setLineDash([]);
    }

    // RSSI chart: active → solid green, others dotted colour
    function drawRssiChart() {
      const W = rssiCanvas.width  = rssiCanvas.offsetWidth;
      const H = rssiCanvas.height = 200;
      rssiCtx.clearRect(0,0,W,H);
      Object.entries(nodeMap).forEach(([ip,nm]) => {
        const solid = (ip === activeIP);
        const color = solid ? '#00cc00' : nm.color;
        drawSeries(rssiCtx, nm.rssiHist, color, H, W, solid);
      });
      drawGuides(rssiCtx,H,W);
    }

    // Retry chart: active → solid green, others dotted; add global fail lines (solid coloured)
    function drawRetryChart() {
      const W = retryCanvas.width  = retryCanvas.offsetWidth;
      const H = retryCanvas.height = 200;
      retryCtx.clearRect(0,0,W,H);
      Object.entries(nodeMap).forEach(([ip,nm]) => {
        const solid = (ip === activeIP);
        const color = solid ? '#00cc00' : nm.color;
        drawSeries(retryCtx, nm.retryHist, color, H, W, solid);
      });
      // Global lines (always solid)
      GLOBAL_LINES.forEach(g => drawSeries(retryCtx, g.hist, g.color, H, W, true));
      drawGuides(retryCtx,H,W);
    }

    // Build legend
    function buildLegend() {
      const items = [];
      Object.entries(nodeMap).forEach(([ip,nm]) => items.push({ label:`Retry ${ip}`, color:nm.color }));
      GLOBAL_LINES.forEach(g => items.push({ label:g.label, color:g.color }));
      retryLegend.innerHTML = items.map(it => `<span class="legend-item"><span class="swatch" style="background:${it.color}"></span>${it.label}</span>`).join('');
    }

    // ------------ Init ------------
    setInterval(updateStatus, 500);
    updateStatus();
  </script>
</body>
</html>
