{
  "name": "waybeam-vehicle",
  "is_vehicle": true,
  "osd_destinations": ["127.0.0.1:7777"],
  "osd_interval_ms": 400,
  "sync_bind": "0.0.0.0",
  "sync_port": 8060,
  "trusted_peers": ["10.6.0.2", "10.6.0.3", "10.6.0.4", "10.6.0.5", "10.6.0.6", "10.6.0.7", "10.6.0.8", "10.6.0.9", "10.6.0.10"],
  "reject_unknown": false,

  "telemetry": {
    "uart_device": "/dev/ttyS2",
    "uart_baud": 420000,
    "udp_port": 14550,
    "udp_bind": "0.0.0.0",
    "udp_target_host": "",
    "udp_target_port": 0,
    "uart_enabled": true,
    "udp_enabled": true,
    "rc_lock_timeout_ms": 1000,
    "protocol": "crsf",
    "msp_baud": 115200,
    "msp_probe_rate_hz": 5
  },

  "pwm": {
    "pwm0_channel": 1,
    "pwm1_channel": 2,
    "frequency_hz": 50,
    "min_us": 1000,
    "max_us": 2000,
    "center_us": 1500,
    "hold_ms": 300,
    "center_timeout_ms": 500,
    "no_mux": false,
    "mux_init_val": 4386,
    "mux_reg": "0x1f207994"
  },

  "webui": {
    "bind": "0.0.0.0",
    "port": 8060
  },

  "debug": {
    "bind": "127.0.0.1",
    "port": 9999,
    "event_ring_depth": 256
  },

  "subscriber": {
    "subscribe_video_cmd": "V=/etc/venc.json;json_cli -i $V -s .outgoing.server '\"udp://{ip}:{port}\"';json_cli -i $V -s .outgoing.enabled true;wget -qO- 'http://127.0.0.1/api/v1/set?outgoing.server=udp://{ip}:{port}';wget -qO- 'http://127.0.0.1/api/v1/set?outgoing.enabled=true'",
    "subscribe_video_disable_cmd": "json_cli -i /etc/venc.json -s .outgoing.enabled false;wget -qO- 'http://127.0.0.1/api/v1/set?outgoing.enabled=false'",
    "timeout_s": 120
  },

  "aalink": {
    "interface": "wlan0",
    "rssi_rate_hz": 30,
    "pubq_enabled": true,
    "adapt_enabled": true,
    "up_cooldown_ms": 2000,
    "up_confidence_loops": 3,
    "hysteresis_pct": 10,
    "max_mcs": 3,
    "max_mcs_40": 3,
    "max_mcs_80": 2,
    "txpower_enabled": false,
    "txpower_min_dbm": 1,
    "txpower_max_dbm": 20,
    "txpower_step_dbm": 2,
    "txpower_low_thresh": -75,
    "txpower_high_thresh": -55
  },

  "venc": {
    "venc_api": "http://127.0.0.1/api/v1",
    "bitrate_enabled": true,
    "thermal_enabled": true,
    "thermal_threshold_c": 95,
    "thermal_exit_delta": 5,
    "thermal_exit_hold_s": 5,
    "osd_value_slot": 6,
    "osd_text_slot": 6,
    "osd_update_rate_hz": 2
  },

  "menu": {
    "sections": [
      { "name": "VIDEO", "items": [
        { "label": "1080p60", "command": "wget -qO- --post-data={\"mode\":1} http://127.0.0.1:8060/venc/mode" },
        { "label": "720p60", "command": "wget -qO- --post-data={\"mode\":4} http://127.0.0.1:8060/venc/mode" },
        { "label": "720p90", "command": "wget -qO- --post-data={\"mode\":5} http://127.0.0.1:8060/venc/mode" },
        { "label": "720p120", "command": "wget -qO- --post-data={\"mode\":6} http://127.0.0.1:8060/venc/mode" },
        { "label": "1080p30", "command": "wget -qO- --post-data={\"mode\":0} http://127.0.0.1:8060/venc/mode" },
        { "label": "1440x1080p60", "command": "wget -qO- --post-data={\"mode\":3} http://127.0.0.1:8060/venc/mode" },
        { "label": "1440x1080p30", "command": "wget -qO- --post-data={\"mode\":2} http://127.0.0.1:8060/venc/mode" }
      ]},
      { "name": "SYSTEM", "items": [
        { "label": "reboot", "command": "reboot" },
        { "label": "halt", "command": "halt" }
      ]},
      { "name": "ENCODER", "items": [
        { "label": "restart venc", "command": "killall -1 venc" },
        { "label": "IDR frame", "command": "wget -qO- http://127.0.0.1/request/idr" }
      ]}
    ],
    "radio_rules": [],
    "menu_asset_id": 7,
    "nav_deadband": 120,
    "action_threshold": 1400,
    "toggle_ch_low_max": 500,
    "toggle_ch4_min": 1500,
    "nav_debounce_ms": 100,
    "select_debounce_ms": 250,
    "toggle_hold_ms": 1000,
    "inactivity_timeout_s": 30,
    "radio_trigger_debounce_ms": 100,
    "radio_reset_debounce_ms": 0
  },

  "osd_render": {
    "config_path": "/etc/waybeam_osd.json",
    "idle_ms": 33,
    "show_stats": false,
    "realtime_flip": false
  },

  "metrics": {
    "interval_ms": 64,
    "sources": {
      "ini": { "enabled": false, "paths": [] },
      "hostapd": { "enabled": false, "iface": "", "sta": "" },
      "wpa_cli": { "enabled": false, "iface": "" },
      "rtl8812eu": { "enabled": false, "iface": "" },
      "cpu": { "enabled": true },
      "venc": { "enabled": false, "url": "" },
      "video": { "enabled": false },
      "telemetry": { "enabled": true }
    },
    "values": ["@signal",null,"@cpu_total","@soc_temp",null,null,null,null],
    "texts": ["@isp_fps",null,"@crsf_voltage","@crsf_flight_mode",null,null,null,null]
  }
}
